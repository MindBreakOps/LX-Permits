<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تصاريح برج مجدول</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --main-blue: #1a2b48; --gold: #c5a059; --verify-green: #28a745; }
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; padding: 20px; }
        
        /* لوحة التحكم */
        .admin-panel { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--main-blue); }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gen { background: var(--main-blue); color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-capture { background: var(--verify-green); color: white; margin-top: 20px; width: 100%; font-size: 18px; }

        /* تصميم التصريح */
        #permit-area { 
            width: 800px; background: white; margin: 40px auto; padding: 40px; 
            border: 1px solid #ddd; position: relative; display: none; box-sizing: border-box;
        }
        
        .verify-badge { 
            background: var(--verify-green); color: white; padding: 10px; text-align: center; 
            font-weight: bold; margin-bottom: 20px; border-radius: 4px; display: none;
        }

        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--main-blue); padding-bottom: 15px; }
        .logo-img { height: 90px; width: auto; }
        #qrcode { background: white; padding: 5px; border: 1px solid #eee; }

        .title-section { text-align: center; margin: 25px 0; }
        .title-section h1 { margin: 0; font-size: 28px; color: var(--main-blue); border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 5px; }
        .serial-tag { font-family: monospace; font-size: 18px; color: #555; font-weight: bold; margin-top: 10px; display: block; }

        .info-table { width: 100%; margin: 20px 0; border-collapse: collapse; }
        .info-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 16px; }
        .label-cell { color: #777; width: 140px; font-weight: bold; }
        .value-cell { font-weight: bold; color: #000; }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #000; }
        .data-table th { background: #f8f9fa; border: 1px solid #000; padding: 12px; font-size: 15px; }
        .data-table td { border: 1px solid #000; padding: 12px; text-align: center; font-size: 15px; }

        .footer { margin-top: 60px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; text-align: center; font-size: 13px; }
        .sig-line { border-top: 1px solid #000; padding-top: 10px; font-weight: bold; height: 100px; }
        .link-expert-title { font-size: 11px; color: #444; display: block; margin-top: 5px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="verify-header" class="verify-badge">✅ تم التحقق: تصريح أصلي ومعتمد - برج مجدول</div>

<div class="admin-panel" id="setup-form">
    <h2 style="text-align: center; color: var(--main-blue);">نظام إصدار التصاريح - برج مجدول</h2>
    
    <div class="row">
        <div class="col">
            <label>نوع التصريح</label>
            <select id="permitType" onchange="updateFormLayout()">
                <option value="تصريح خروج مواد">تصريح خروج مواد</option>
                <option value="تصريح دخول مواد">تصريح دخول مواد</option>
                <option value="تصريح دخول عمال">تصريح دخول عمال</option>
            </select>
        </div>
        <div class="col">
            <label>اسم طالب التصريح</label>
            <input type="text" id="reqName" placeholder="الاسم الكامل">
        </div>
    </div>

    <div class="row">
        <div class="col">
            <label>الشركة المستأجرة</label>
            <select id="company" onchange="loadUnits()">
                <option value="">اختر الشركة</option>
                <option value="Majdoul">Majdoul (42,43,52)</option>
                <option value="Awtad">Awtad (38)</option>
                <option value="Rakal">Rakal</option>
                <option value="Dan">Dan (36,37)</option>
                <option value="Smith & Nephew">Smith & Nephew (12)</option>
                <option value="HUMAIN">HUMAIN (16-21)</option>
                <option value="Beckman Coulter">Beckman Coulter (10)</option>
                <option value="Emdad">Emdad</option>
                <option value="MIM">MIM</option>
                <option value="Daffah">Daffah (39)</option>
            </select>
        </div>
        <div class="col"><label>الوحدة / الدور</label><select id="unitSelect"></select></div>
    </div>

    <div class="row">
        <div class="col"><label>صلاحية من</label><input type="date" id="dS"></div>
        <div class="col"><label>صلاحية إلى</label><input type="date" id="dE"></div>
    </div>

    <div id="items-area">
        <div id="dynamic-rows"></div>
        <button class="btn" style="background:#eee; margin-top:10px; font-size: 12px;" onclick="addRow()">+ إضافة سطر</button>
    </div>

    <button class="btn btn-gen" onclick="generatePermit()">إصدار التصريح (توليد QR)</button>
</div>

<div id="permit-area">
    <div class="header-section">
        <img src="majdoul.png" class="logo-img" alt="Logo">
        <div id="qrcode"></div>
    </div>

    <div class="title-section">
        <h1 id="p-title-display">تصريح خروج مواد</h1>
        <div class="serial-tag" id="p-serial">MT-000000</div>
    </div>

    <table class="info-table">
        <tr>
            <td class="label-cell">الشركة:</td><td class="value-cell" id="p-co"></td>
            <td class="label-cell">الوحدة:</td><td class="value-cell" id="p-un"></td>
        </tr>
        <tr>
            <td class="label-cell">مقدم الطلب:</td><td class="value-cell" id="p-req"></td>
            <td class="label-cell">التاريخ:</td><td class="value-cell" id="p-time"></td>
        </tr>
    </table>

    <table class="data-table">
        <thead id="p-thead"></thead>
        <tbody id="p-tbody"></tbody>
    </table>

    <div class="footer">
        <div class="sig-line">توقيع مقدم الطلب<br><span id="sig-n" style="font-size:14px; margin-top:5px; display:block;"></span></div>
        <div class="sig-line">
            Link Expert
            <span class="link-expert-title">الشركة المشغلة للمرافق الخارجية والمواقف للبرج</span>
        </div>
        <div class="sig-line">إدارة برج مجدول<br><span style="font-size: 10px; color:#666;">Majdoul Tower Management</span></div>
    </div>

    <button class="btn btn-capture" id="cap-btn" onclick="takeShot()">حفظ التصريح كصورة PNG</button>
</div>

<script>
    const coData = {
        "Majdoul": ["42", "43", "52"], "Awtad": ["38"], "Rakal": ["General"],
        "Dan": ["36", "37"], "Smith & Nephew": ["12"],
        "HUMAIN": ["16", "17", "18", "19", "20", "21"], "Beckman Coulter": ["10"],
        "Emdad": ["General"], "MIM": ["General"], "Daffah": ["39"]
    };

    function loadUnits() {
        const u = document.getElementById('unitSelect');
        u.innerHTML = "";
        (coData[document.getElementById('company').value] || []).forEach(item => {
            u.innerHTML += `<option value="${item}">وحدة ${item}</option>`;
        });
    }

    function updateFormLayout() {
        document.getElementById('dynamic-rows').innerHTML = "";
        addRow();
    }

    function addRow() {
        const type = document.getElementById('permitType').value;
        const container = document.getElementById('dynamic-rows');
        const div = document.createElement('div');
        div.className = "row";
        if(type.includes("عمال")) {
            div.innerHTML = `<input type="text" class="c1" placeholder="اسم العامل" style="flex:2">
                             <input type="text" class="c2" placeholder="رقم الهوية" style="flex:1">
                             <input type="text" class="c3" placeholder="المهنة" style="flex:1">`;
        } else {
            div.innerHTML = `<input type="text" class="c1" placeholder="اسم المادة" style="flex:3">
                             <input type="number" class="c2" placeholder="الكمية" style="flex:1">`;
        }
        container.appendChild(div);
    }

    addRow();

    function generatePermit() {
        const type = document.getElementById('permitType').value;
        const serial = "MT-" + Math.floor(100000 + Math.random() * 900000);
        
        document.getElementById('p-title-display').innerText = type;
        document.getElementById('p-co').innerText = document.getElementById('company').value;
        document.getElementById('p-un').innerText = document.getElementById('unitSelect').value;
        document.getElementById('p-req').innerText = document.getElementById('reqName').value;
        document.getElementById('sig-n').innerText = document.getElementById('reqName').value;
        document.getElementById('p-time').innerText = document.getElementById('dS').value + " إلى " + document.getElementById('dE').value;
        document.getElementById('p-serial').innerText = serial;

        // QR Code التحقق
        const currentURL = window.location.href.split('?')[0];
        const verificationLink = currentURL + "?verify=" + serial;
        
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: verificationLink,
            width: 100,
            height: 100,
            colorDark : "#1a2b48"
        });

        const thead = document.getElementById('p-thead');
        const tbody = document.getElementById('p-tbody');
        thead.innerHTML = ""; tbody.innerHTML = "";

        if(type.includes("عمال")) {
            thead.innerHTML = "<tr><th>الاسم الكامل</th><th>رقم الهوية</th><th>المهنة</th></tr>";
        } else {
            thead.innerHTML = "<tr><th>اسم المادة / الأداة</th><th>الكمية</th></tr>";
        }

        document.querySelectorAll('#dynamic-rows .row').forEach(r => {
            const v1 = r.querySelector('.c1').value;
            const v2 = r.querySelector('.c2').value;
            const v3 = r.querySelector('.c3') ? r.querySelector('.c3').value : null;
            if(v1) {
                let rowHTML = `<tr><td>${v1}</td><td>${v2}</td>`;
                if(v3) rowHTML += `<td>${v3}</td>`;
                rowHTML += `</tr>`;
                tbody.innerHTML += rowHTML;
            }
        });

        document.getElementById('permit-area').style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }

    function takeShot() {
        const btn = document.getElementById('cap-btn');
        btn.style.display = 'none';
        html2canvas(document.getElementById('permit-area'), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Majdoul_Permit_' + Date.now() + '.png';
            link.href = canvas.toDataURL();
            link.click();
            btn.style.display = 'block';
        });
    }

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        if(params.has('verify')) {
            document.getElementById('setup-form').style.display = 'none';
            document.getElementById('verify-header').style.display = 'block';
            document.body.style.background = "#e8f5e9";
        }
    }
</script>

</body>
</html>
