<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majdoul Tower - Permit Capture System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --majdoul-blue: #1a2b48; --gold: #c5a059; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        
        /* Dashboard Styling */
        .admin-panel { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--majdoul-blue); font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gen { background: var(--majdoul-blue); color: white; width: 100%; font-size: 16px; }
        .btn-capture { background: #28a745; color: white; margin-top: 20px; }

        /* PERMIT DESIGN (The section to be captured) */
        #permit-capture-area { 
            width: 800px; min-height: 1000px; background: white; margin: auto; 
            padding: 40px; border: 1px solid #eee; position: relative; display: none;
        }
        
        .permit-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--majdoul-blue); padding-bottom: 20px; }
        .logo-img { width: 180px; }
        #qrcode { width: 100px; height: 100px; border: 5px solid white; }
        
        .title-banner { text-align: center; margin: 30px 0; }
        .title-banner h1 { margin: 0; color: var(--majdoul-blue); letter-spacing: 2px; border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 5px; }
        
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .detail-box { border-bottom: 1px solid #eee; padding: 5px 0; }
        .detail-label { font-size: 11px; color: #777; font-weight: bold; text-transform: uppercase; }
        .detail-value { font-size: 16px; font-weight: bold; color: #111; display: block; }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th { background: #f4f4f4; border: 1px solid #ddd; padding: 12px; text-align: left; color: var(--majdoul-blue); }
        .data-table td { border: 1px solid #ddd; padding: 12px; font-size: 14px; }

        .footer-sigs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; margin-top: 80px; text-align: center; }
        .sig-line { border-top: 1px solid #000; padding-top: 10px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-panel">
    <h2 style="text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px;">Majdoul Tower Permit Portal</h2>
    
    <div class="row">
        <div class="col">
            <label>Permit Type</label>
            <select id="permitType" onchange="toggleForm()">
                <option value="Material Exit">Material Exit Permit (تصريح خروج مواد)</option>
                <option value="Labor">Labor Permit (تصريح عمالة)</option>
            </select>
        </div>
        <div class="col">
            <label>Requester Name</label>
            <input type="text" id="requesterInput" placeholder="Name of applicant">
        </div>
    </div>

    <div class="row">
        <div class="col">
            <label>Company</label>
            <select id="companySelect" onchange="loadUnits()">
                <option value="">Select Company</option>
                <option value="Majdoul">Majdoul</option>
                <option value="Awtad">Awtad</option>
                <option value="Rakal">Rakal</option>
                <option value="Dan">Dan</option>
                <option value="Smith & Nephew">Smith & Nephew</option>
                <option value="HUMAIN">HUMAIN</option>
                <option value="Beckman Coulter">Beckman Coulter</option>
                <option value="Emdad">Emdad</option>
                <option value="MIM">MIM</option>
                <option value="Daffah">Daffah</option>
            </select>
        </div>
        <div class="col">
            <label>Unit</label>
            <select id="unitSelect"></select>
        </div>
    </div>

    <div class="row">
        <div class="col"><label>Valid From</label><input type="date" id="dateS"></div>
        <div class="col"><label>Valid To</label><input type="date" id="dateE"></div>
    </div>

    <div id="materialInput">
        <label>Materials</label>
        <div id="matRows"></div>
        <button onclick="addMatRow()" style="margin-top:10px;">+ Add Item</button>
    </div>

    <div id="laborInput" style="display:none;">
        <label>Labor Details</label>
        <div id="labRows"></div>
        <button onclick="addLabRow()" style="margin-top:10px;">+ Add Worker</button>
    </div>

    <button class="btn btn-gen" onclick="generate()">Generate Permit View</button>
</div>

<div id="permit-capture-area">
    <div class="permit-header">
        <img src="majdoul.png" class="logo-img" alt="Logo">
        <div id="qrcode"></div>
    </div>

    <div class="title-banner">
        <h1 id="p-title-text">MATERIAL EXIT PERMIT</h1>
        <p style="font-weight: bold;" id="p-serial"></p>
    </div>

    <div class="details-grid">
        <div class="detail-box"><span class="detail-label">Requester</span><span class="detail-value" id="p-req"></span></div>
        <div class="detail-box"><span class="detail-label">Company / Unit</span><span class="detail-value" id="p-co"></span></div>
        <div class="detail-box"><span class="detail-label">Duration</span><span class="detail-value" id="p-dates"></span></div>
        <div class="detail-box"><span class="detail-label">Security Firm</span><span class="detail-value">Link Expert</span></div>
    </div>

    <table class="data-table">
        <thead id="p-thead"></thead>
        <tbody id="p-tbody"></tbody>
    </table>

    <div class="footer-sigs">
        <div class="sig-line">Requester Signature<br><span id="sig-name"></span></div>
        <div class="sig-line">Link Expert Security<br>Authorized Signatory</div>
        <div class="sig-line">Majdoul Tower<br>Management Stamp</div>
    </div>

    <div style="text-align: center;">
        <button class="btn btn-capture" onclick="captureToImage()">Download as PNG Image</button>
    </div>
</div>

<script>
    const coMap = {
        "Majdoul": ["42", "43", "52"], "Awtad": ["Unit 38"], "Rakal": ["General"],
        "Dan": ["Unit 36", "Unit 37"], "Smith & Nephew": ["Unit 12"],
        "HUMAIN": ["16", "17", "18", "19", "20", "21"], "Beckman Coulter": ["Unit 10"],
        "Emdad": ["General"], "MIM": ["General"], "Daffah": ["Unit 39"]
    };
    const jobs = ["عامل (Worker)", "مشرف (Supervisor)", "عامل كهرباء (Electrician)", "فني (Technician)"];

    function loadUnits() {
        const sel = document.getElementById('unitSelect');
        sel.innerHTML = "";
        (coMap[document.getElementById('companySelect').value] || []).forEach(u => {
            sel.innerHTML += `<option value="${u}">${u}</option>`;
        });
    }

    function toggleForm() {
        const type = document.getElementById('permitType').value;
        document.getElementById('materialInput').style.display = type.includes('Material') ? 'block' : 'none';
        document.getElementById('laborInput').style.display = type === 'Labor' ? 'block' : 'none';
    }

    function addMatRow() {
        const d = document.createElement('div'); d.className = 'row';
        d.innerHTML = `<input type="text" class="m-name" placeholder="Item Name" style="flex:2">
                       <select class="m-qty" style="flex:1">${[...Array(11).keys()].slice(1).map(i=>`<option>${i}</option>`).join('')}<option>Multiple</option></select>
                       <button onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('matRows').appendChild(d);
    }

    function addLabRow() {
        const d = document.createElement('div'); d.className = 'row';
        d.innerHTML = `<input type="text" class="l-name" placeholder="Worker Name" style="flex:1">
                       <input type="text" class="l-id" placeholder="ID Number" style="flex:1">
                       <select class="l-job" style="flex:1">${jobs.map(j=>`<option>${j}</option>`).join('')}</select>
                       <button onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('labRows').appendChild(d);
    }

    addMatRow(); addLabRow();

    function generate() {
        const type = document.getElementById('permitType').value;
        const serial = "MTP-" + Date.now().toString().slice(-6);
        
        // Populate Texts
        document.getElementById('p-title-text').innerText = type.toUpperCase();
        document.getElementById('p-req').innerText = document.getElementById('requesterInput').value;
        document.getElementById('sig-name').innerText = document.getElementById('requesterInput').value;
        document.getElementById('p-co').innerText = document.getElementById('companySelect').value + " / Unit " + document.getElementById('unitSelect').value;
        document.getElementById('p-dates').innerText = document.getElementById('dateS').value + " to " + document.getElementById('dateE').value;
        document.getElementById('p-serial').innerText = "Serial: " + serial;

        // Generate QR Code (Real Barcode)
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: serial, width: 100, height: 100 });

        // Build Table
        const head = document.getElementById('p-thead');
        const body = document.getElementById('p-tbody');
        head.innerHTML = ""; body.innerHTML = "";

        if(type.includes("Material")) {
            head.innerHTML = "<tr><th>#</th><th>Material Name (اسم المادة)</th><th>Quantity (الكمية)</th></tr>";
            document.querySelectorAll('#matRows .row').forEach((r, i) => {
                const n = r.querySelector('.m-name').value;
                if(n) body.innerHTML += `<tr><td>${i+1}</td><td>${n}</td><td>${r.querySelector('.m-qty').value}</td></tr>`;
            });
        } else {
            head.innerHTML = "<tr><th>#</th><th>Name</th><th>ID Number</th><th>Profession</th></tr>";
            document.querySelectorAll('#labRows .row').forEach((r, i) => {
                const n = r.querySelector('.l-name').value;
                if(n) body.innerHTML += `<tr><td>${i+1}</td><td>${n}</td><td>${r.querySelector('.l-id').value}</td><td>${r.querySelector('.l-job').value}</td></tr>`;
            });
        }

        document.getElementById('permit-capture-area').style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }

    function captureToImage() {
        const area = document.getElementById('permit-capture-area');
        // Hide the button before capture
        area.querySelector('.btn-capture').style.display = 'none';
        
        html2canvas(area, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Majdoul_Permit.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
            area.querySelector('.btn-capture').style.display = 'block';
        });
    }
</script>

</body>
</html>
