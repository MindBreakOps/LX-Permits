<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Expert - Majdoul Tower Permits</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --main-blue: #0c2340; --gold: #a6893a; --verify-green: #28a745; }
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        /* واجهة الإدخال */
        .admin-panel { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--main-blue); }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-gen { background: var(--main-blue); color: white; font-size: 16px; }
        .btn-add { background: #eee; color: #333; margin-bottom: 10px; width: auto; font-size: 12px; }

        /* تصميم التصريح النهائي (للحفظ كصورة) */
        #permit-area { 
            width: 850px; background: white; margin: 40px auto; padding: 50px; 
            border: 1px solid #ddd; display: none; box-sizing: border-box;
        }

        /* الهيدر: الشعار يمين كبير، نص وسط، QR يسار */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-box { width: 180px; text-align: right; }
        .logo-img { width: 100%; height: auto; }
        .center-text { text-align: center; flex: 1; }
        .center-text h2 { margin: 0; color: var(--main-blue); font-size: 26px; }
        .center-text p { margin: 5px 0; font-size: 20px; font-weight: bold; color: var(--main-blue); }
        #qrcode { width: 110px; height: 110px; background: white; padding: 5px; border: 1px solid #eee; }

        .divider { height: 3px; background-color: var(--main-blue); width: 100%; margin-bottom: 30px; }

        /* الجداول */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th { background: #f8f9fa; border: 1px solid #000; padding: 10px; font-size: 14px; text-align: center; }
        .data-table td { border: 1px solid #000; padding: 10px; text-align: center; }

        /* شاشة التحقق */
        #verify-screen { 
            display: none; max-width: 600px; margin: 50px auto; background: white; 
            padding: 40px; border-radius: 20px; text-align: center; border-top: 15px solid var(--verify-green);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .footer { margin-top: 60px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; text-align: center; }
        .sig-box { border-top: 1px solid #000; padding-top: 10px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div id="verify-screen">
    <div style="font-size: 50px;">✅</div>
    <h2 style="color: var(--verify-green);">تصريح أصلي ومعتمد</h2>
    <p>بوابات برج مجدول - نظام Link Expert</p>
    <div id="v-data" style="background: #f9f9f9; padding: 20px; border-radius: 10px; margin: 20px 0; text-align: right;">
        <p><strong>النوع:</strong> <span id="v-type"></span></p>
        <p><strong>الجهة:</strong> <span id="v-co"></span></p>
        <p><strong>تاريخ الانتهاء:</strong> <span id="v-exp" style="color:red; font-weight:bold;"></span></p>
    </div>
    <button class="btn" onclick="location.href=location.pathname" style="background:var(--main-blue); color:white;">إصدار تصريح جديد</button>
</div>

<div class="admin-panel" id="admin-panel">
    <h2 style="text-align: center; color: var(--main-blue);">بوابة تصاريح Link Expert - برج مجدول</h2>
    
    <div class="row">
        <div class="col">
            <label>نوع التصريح</label>
            <select id="permitType" onchange="toggleForm()">
                <option value="LABOR ENTRY / دخول عمال">دخول عمال</option>
                <option value="MATERIAL ENTRY / دخول مواد">دخول مواد</option>
                <option value="MATERIAL EXIT / خروج مواد">خروج مواد</option>
            </select>
        </div>
        <div class="col">
            <label>الشركة / المقاول</label>
            <select id="company">
                <option value="Lenovo / لينوفو">Lenovo / لينوفو</option>
                <option value="Awtad / أوتاد">Awtad / أوتاد</option>
                <option value="STC Solutions / حلول الاتصالات">STC Solutions</option>
                <option value="Smith & Nephew">Smith & Nephew</option>
                <option value="Other / أخرى">شركة أخرى</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col"><label>رقم الوحدة</label><input type="text" id="unit" placeholder="Floor 38 / Unit 5"></div>
        <div class="col"><label>تاريخ الانتهاء</label><input type="date" id="expiry"></div>
    </div>

    <div id="dynamic-input-area">
        <table class="data-table" id="inputTable">
            <thead id="inputHead"></thead>
            <tbody id="inputBody"></tbody>
        </table>
        <button class="btn btn-add" onclick="addNewRow()">+ إضافة سطر</button>
    </div>

    <button class="btn btn-gen" onclick="generatePermit()">إصدار التصريح (QR Active)</button>
</div>

<div id="permit-area">
    <div class="header-section">
        <div id="qrcode"></div> <div class="center-text"> <h2>برج مجدول</h2>
            <p>Majdoul Tower</p>
        </div>
        <div class="logo-box"> <img src="majdoul.png" class="logo-img" alt="Logo">
        </div>
    </div>

    <div class="divider"></div>

    <div style="text-align: center;">
        <h1 id="p-title" style="margin:0; font-size: 28px; text-decoration: underline;"></h1>
        <p id="p-serial" style="font-family: monospace; font-weight: bold;"></p>
    </div>

    <div class="row" style="margin-top:30px; border-bottom:1px solid #eee; padding-bottom:10px;">
        <div class="col"><strong>الشركة:</strong> <span id="p-co"></span></div>
        <div class="col"><strong>الوحدة:</strong> <span id="p-unit"></span></div>
        <div class="col"><strong>تنتهي في:</strong> <span id="p-exp" style="color:red;"></span></div>
    </div>

    <table class="data-table">
        <thead id="p-thead"></thead>
        <tbody id="p-tbody"></tbody>
    </table>

    <div class="footer">
        <div class="sig-box">توقيع المسؤول<br>Authorized Person</div>
        <div class="sig-box">Link Expert<br><small>الشركة المشغلة للمرافق</small></div>
        <div class="sig-box">إدارة البرج<br>Tower Management</div>
    </div>

    <button class="btn" id="cap-btn" onclick="takeShot()" style="background:var(--verify-green); color:white; margin-top:30px;">حفظ كصورة PNG للإرسال</button>
</div>

<script>
    // وظيفة إضافة سطر بناءً على النوع
    function toggleForm() {
        const type = document.getElementById('permitType').value;
        const head = document.getElementById('inputHead');
        document.getElementById('inputBody').innerHTML = "";
        
        if(type.includes("LABOR")) {
            head.innerHTML = "<tr><th>اسم العامل</th><th>رقم الهوية</th><th>المهنة</th></tr>";
        } else {
            head.innerHTML = "<tr><th>اسم المادة</th><th>الكمية</th><th>ملاحظات</th></tr>";
        }
        addNewRow();
    }

    function addNewRow() {
        const type = document.getElementById('permitType').value;
        const body = document.getElementById('inputBody');
        const tr = document.createElement('tr');
        if(type.includes("LABOR")) {
            tr.innerHTML = `<td><input type="text"></td><td><input type="text"></td><td><select><option>فني</option><option>مشرف</option><option>عامل</option><option>مهندس</option></select></td>`;
        } else {
            tr.innerHTML = `<td><input type="text"></td><td><input type="number" value="1"></td><td><input type="text"></td>`;
        }
        body.appendChild(tr);
    }

    // وظيفة الإصدار وتفعيل الـ QR
    function generatePermit() {
        const type = document.getElementById('permitType').value;
        const co = document.getElementById('company').value;
        const exp = document.getElementById('expiry').value;
        const unit = document.getElementById('unit').value;
        const serial = "MTP-" + Math.floor(100000 + Math.random() * 900000);

        document.getElementById('p-title').innerText = type;
        document.getElementById('p-co').innerText = co;
        document.getElementById('p-unit').innerText = unit;
        document.getElementById('p-exp').innerText = exp;
        document.getElementById('p-serial').innerText = "SERIAL: " + serial;

        // توليد رابط التحقق الحقيقي لـ GitHub Pages
        const baseURL = window.location.href.split('?')[0];
        const vLink = `${baseURL}?v=1&t=${encodeURIComponent(type)}&c=${encodeURIComponent(co)}&e=${encodeURIComponent(exp)}`;

        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: vLink, width: 110, height: 110 });

        // نقل البيانات للجدول النهائي
        document.getElementById('p-thead').innerHTML = document.getElementById('inputHead').innerHTML;
        const rows = document.querySelectorAll('#inputBody tr');
        let html = "";
        rows.forEach(r => {
            const vals = Array.from(r.querySelectorAll('input, select')).map(i => i.value);
            html += `<tr>${vals.map(v => `<td>${v}</td>`).join('')}</tr>`;
        });
        document.getElementById('p-tbody').innerHTML = html;

        document.getElementById('permit-area').style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }

    // تفعيل شاشة التحقق عند قراءة الـ QR
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('v')) {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('verify-screen').style.display = 'block';
            document.getElementById('v-type').innerText = urlParams.get('t');
            document.getElementById('v-co').innerText = urlParams.get('c');
            document.getElementById('v-exp').innerText = urlParams.get('e');
        }
        toggleForm();
    }

    function takeShot() {
        const btn = document.getElementById('cap-btn');
        btn.style.display = 'none';
        html2canvas(document.getElementById('permit-area'), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Majdoul_Permit.png';
            link.href = canvas.toDataURL();
            link.click();
            btn.style.display = 'block';
        });
    }
</script>
</body>
</html>
